<section class="contact-form-box">

<h2>Send a Request</h2>

<p>
Please fill out the form below and I will get back to you as soon as possible.
</p>

<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

<div class="form-group">
<label for="name">Full Name *</label>
<input
type="text"
id="name"
name="name"
placeholder="Enter your full name"
required>
</div>

<div class="form-group">
<label for="organization">Organization / University</label>
<input
type="text"
id="organization"
name="organization"
placeholder="Enter your organization or university">
</div>

<div class="form-group">
<label for="email">Email Address *</label>
<input
type="email"
id="email"
name="email"
placeholder="Enter your email address"
required>
</div>

<div class="form-group">
<label for="purpose">Purpose of Inquiry *</label>

<select id="purpose" name="purpose">

<option>Research Collaboration</option>

<option>AI & Business Analytics Consulting</option>

<option>Technology Intelligence Project</option>

<option>Business Data Analytics Project</option>

<option>Speaking Invitation</option>

<option>Teaching Opportunity</option>

<option>Graduate Student Inquiry</option>

<option>General Question</option>

</select>

</div>

<div class="form-group">
<label for="subject">Subject</label>

<input
type="text"
id="subject"
name="subject"
placeholder="Enter the subject">

</div>

<div class="form-group">
<label for="message">Message *</label>

<textarea
id="message"
name="message"
rows="8"
placeholder="Please provide details about your inquiry..."
required></textarea>

</div>

<button class="submit-btn">
Send Message
</button>

<p class="small-note">

Your information will only be used to respond to your inquiry.

</p>

</form>

</section>
